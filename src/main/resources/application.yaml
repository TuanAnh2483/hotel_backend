spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel_mvp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-env-32chars-minimum}
    exp-seconds: 86400
  admin-seed:
    enabled: ${ADMIN_SEED_ENABLED:true}
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:Password123}
logging:
  level:
    org.springframework.web: INFO
