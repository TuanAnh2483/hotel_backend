version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: ${SPRING_DATASOURCE_USERNAME}
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: hotel_backend_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - .env

volumes:
  postgres_data:
