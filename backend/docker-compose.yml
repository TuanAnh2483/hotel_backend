services:
  postgres:
    image: postgres:16
    container_name: hotel_postgres
    restart: always
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build:
      context: backend
      dockerfile: Dockerfile
    container_name: hotel_backend_app
    depends_on:
      - postgres
      - redis
    ports:
      - "8080:8080"
    env_file:
      - backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4

volumes:
  postgres_data:
