spring:
  datasource:
    url: jdbc:h2:mem:hotel_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

app:
  jwt:
    secret: "test-secret-key-for-concurrency-tests-1234567890"
    exp-seconds: 86400
  mail:
    enabled: false
