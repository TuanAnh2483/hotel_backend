spring:
  datasource:
    url: jdbc:h2:mem:hotel_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

  mail:
    host: smtp.example.com
    port: 587
    username: test@example.com
    password: test-password

app:
  jwt:
    secret: "test-secret-key-for-concurrency-tests-1234567890"
    exp-seconds: 86400
  admin-seed:
    enabled: false
    email: admin@example.com
    password: test-admin-password
  mail:
    enabled: false
    expose-debug-tokens: true
  uploads:
    provider: local
    storage-root: ./target/test-uploads
    public-base-path: /uploads
    max-file-size-bytes: 10485760
  payment:
    provider: sepay-vietqr
    transfer-prefix: HHB
    qr-image-url: ""
    bank:
      account-no: "0966927203"
      account-name: "Test Account"
      bank-name: "MB Bank"
      # Cố định rỗng để test không bị rò rỉ PAYMENT_BANK_BIN từ file .env (qua spring.config.import).
      # Khi bank-bin rỗng, buildVietQrUrl fallback về qr-image-url ("") -> qrImageUrl rỗng như test mong đợi.
      bank-bin: ""
    sepay:
      webhook-api-key: hhb_sepay_webhook_2026
  ai:
    gemini-api-key: "test-gemini-key"
    model: "gemini-2.0-flash"
  google:
    client-id: ""
  resend:
    api-key: ""
  rate-limit:
    enabled: false

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false