version: "3.9"

services:
  pg:
    image: postgres:15
    container_name: pg
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: hotel_mvp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: booking_app
    depends_on:
      - pg
      - redis
    environment:
      DB_URL: jdbc:postgresql://pg:5432/hotel_mvp
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      JWT_SECRET: super-secret-key-123456789
    ports:
      - "8080:8080"

volumes:
  pg_data: