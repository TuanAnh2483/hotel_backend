spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hotel_mvp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:trananhtodien@gmail.com}
    password: ${MAIL_PASSWORD:pkbrrvnosbdvuuiq}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-env-32chars-minimum}
    exp-seconds: 86400
  admin-seed:
    enabled: ${ADMIN_SEED_ENABLED:true}
    email: ${ADMIN_EMAIL:admin@example.com}
    password: ${ADMIN_PASSWORD:Password123}
  password-reset:
    frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:3000/reset-password}
  email-verification:
    frontend-verify-url: ${EMAIL_VERIFICATION_FRONTEND_URL:http://localhost:3000/verify-email}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from: ${MAIL_FROM:trananhtodien@gmail.com}
    expose-debug-tokens: ${MAIL_EXPOSE_DEBUG_TOKENS:false}
logging:
  level:
    org.springframework.web: INFO
