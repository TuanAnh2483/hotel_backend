

  name: CI - Run Tests

  on:
    push:
      branches: [ master, main ]
    pull_request:
      branches: [ master, main ]

  jobs:
    test:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Java 17
          uses: actions/setup-java@v4
          with:
            java-version: '17'
            distribution: 'temurin'
            cache: maven

        - name: Run tests
          run: mvn test -Dspring.profiles.active=test